workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    max_build_duration: 60
    working_directory: mobile_app
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS Release
        script: |
          # Compilamos para iOS en modo release sin firma
          flutter build ios --release --no-codesign
      - name: Create IPA for Sideloadly
        script: |
          # Empaquetamos manualmente el .app en un .ipa
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r cuentacontable.ipa Payload
          # Movemos el resultado a una carpeta que CodeMagic reconozca como artefacto
          mkdir -p build/ios/ipa
          mv cuentacontable.ipa build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa

  android-workflow:
    name: Android Workflow
    instance_type: linux
    max_build_duration: 30
    working_directory: mobile_app
    environment:
      flutter: stable
    scripts:
      - name: Install dependencies
        script: |
          flutter packages pub get
      - name: Flutter build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - josebacilio2004@gmail.com
