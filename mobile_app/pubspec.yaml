name: cuentacontable_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  google_fonts: ^8.1.0
  intl: ^0.20.2
  fl_chart: ^1.2.0
  lucide_icons: ^0.257.0
  shared_preferences: ^2.5.5
  logger: ^2.7.0
  local_auth: ^3.0.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21